name: "Visible Name: Pipeline CI/CD"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: "Descargar código"
        uses: actions/checkout@v3
      
      - name: "Configurar Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          #cache: "npm"
      
      - name: "Instalar dependencias"
        #run: npm ci
        run: npm install
      
      - name: "Ejecutar pruebas"
        run: npm test || true # exit code por credenciales externas
  
  docker-submit:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Solo ejecutar en main

    steps:
      - name: "Descargar código"
        uses: actions/checkout@v3

      - name: "Login en DockerHub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: "Construir y publicar imagen"
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/juice-shop:latest
        