name: "Visible Name: Pipeline CI/CD"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: "Descargar código"
        uses: actions/checkout@v3
      
      - name: "Configurar Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          #cache: "npm"
      
      - name: "Instalar dependencias"
        run: npm ci
      
      - name: "Ejecutar pruebas"
        run: npm test