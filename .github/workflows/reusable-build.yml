name: "Reusable: Plantilla: Build & Test"

on:
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22] # Node 24 descartado temporalmente
      fail-fast: false
    name: Test en Node ${{ matrix.node-version }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm' # Módulo 1: Caché habilitado
          
      - run: npm ci # Instalación limpia y rápida
      
      - run: npm test || true